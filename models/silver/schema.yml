version: 2

models:
  - name: stg_encounters
    description: "Cleaned encounter-level data."
    columns:
      - name: encounter_id
        tests:
          - not_null
          - unique
      - name: patient_id
        tests:
          - not_null
  - name: stg_organizations
    description: "Cleaned organization data."
    columns:
      - name: organization_id
        tests:
          - not_null
          - unique
      - name: name
        tests:
          - not_null
  - name: stg_patients
    description: "Cleaned patient demographic data."
    columns:
      - name: patient_id
        tests:
          - not_null
          - unique
      - name: gender
        tests:
          - accepted_values:
              values: ['male', 'female', 'other']
  - name: stg_payers
    description: "Cleaned payer information."
    columns:
      - name: payer_id
        tests:
          - not_null
          - unique
      - name: payer_name
        tests:
          - not_null
  - name: stg_procedures
    description: "Cleaned and enriched procedures data with duration and date parts."
    columns:
      - name: patient
        tests:
          - not_null
      - name: encounter
        tests:
          - not_null
      - name: code
        tests:
          - not_null
      - name: base_cost
        tests:
          - not_null
          - greater_than: {value: 0}
      - name: duration_seconds
        tests:
          - not_null
          - greater_than: {value: 0}
      - name: year
        tests:
          - not_null
      - name: month_number
        tests:
          - not_null
          - between:
              min_value: 1
              max_value: 12
      - name: week_number
        tests:
          - not_null
